version: "3.8"

services:
  # FastAPI & Cognee Backend
  capi-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: capi-backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-gsk_your_groq_api_key_here}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - COGNEE_MODE=${COGNEE_MODE:-open_source}
      - COGNEE_API_URL=${COGNEE_API_URL:-}
      - COGNEE_API_KEY=${COGNEE_API_KEY:-}
      - LLM_PROVIDER=custom
      - LLM_MODEL=groq/llama-3.3-70b-versatile
      - EMBEDDING_PROVIDER=fastembed
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
    volumes:
      - cognee_storage:/app/.cognee_data
    networks:
      - capi-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js 14 Vegas Detective Dashboard
  capi-frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
    container_name: capi-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - NODE_ENV=production
    depends_on:
      capi-backend:
        condition: service_healthy
    networks:
      - capi-network

volumes:
  cognee_storage:
    driver: local

networks:
  capi-network:
    driver: bridge
