services:
  # Capi Backend (FastAPI + Cognee)
  - type: web
    name: capi-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: COGNEE_MODE
        value: open_source
      - key: LLM_PROVIDER
        value: custom
      - key: LLM_MODEL
        value: groq/llama-3.3-70b-versatile
